{% extends 'registration_base.html' %}
{% block title %}Password Reset Input{% endblock %}
{% block heading %}
	<h2>Password Reset Input</h2>
{% endblock %}
{% block content %}
	{% if validlink %}
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <input type="submit" value="Change password">
        </form>
    {% else %}
        <p>
        Invalid password reset link!
        </p>
    {% endif %}
{% endblock %}
