{% extends 'registration_base.html' %}
{% block title %}Login{% endblock %}
{% block heading %}
	<h2>Login</h2>
{% endblock %}
{% block content %}
	<form method="POST">
		{% csrf_token %}
		{{ form.as_p }}
		<button type="submit">Login</button>
	</form>
	<a href="{% url 'password_reset' %}">Forgot password?</a> <br>
{% endblock %}
