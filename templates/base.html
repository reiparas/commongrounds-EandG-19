<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Common Grounds{% endblock %}</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 900px; margin: 0 auto; padding: 20px; }
        nav { background: #333; padding: 10px; margin-bottom: 20px; border-radius: 5px; }
        nav a { color: white; text-decoration: none; margin-right: 15px; }
        nav a:hover { text-decoration: underline; }
        h1 { color: #333; }
        a { color: #0066cc; }
        .card { border: 1px solid #ddd; padding: 15px; margin: 10px 0; border-radius: 5px; }
        .back-link { margin-top: 20px; display: block; }
    </style>
</head>
<body>
    <nav>
        <a href="/merchstore/items">Merch Store</a>
        <a href="/localevents/events">Local Events</a>
        <a href="/bookclub/books">Book Club</a>
        <a href="/diyprojects/projects">DIY Projects</a>
        <a href="/commissions/requests">Commissions</a>
    </nav>
    {% block content %}{% endblock %}
</body>
</html>
